default_provider = "onepass"
if_missing = "error"

[providers.onepass]
type = "1password"
vault = "homelab"
account = "my.1password.com"

[providers.age]
type = "age"
recipients = ["ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBDbuPSH93RCTHG7iTHxg+De/yMWUVB+Q4EFt4llpPDL"]

[secrets]
VPS0_IP= { provider = "onepass", value = "op://homelab/vps0/ip", sync = { provider = "age", value = "" } }
OP_SERVICE_ACCOUNT_TOKEN= { provider = "onepass", value = "op://homelab/svc/credential", sync = { provider = "age", value = "" } }
